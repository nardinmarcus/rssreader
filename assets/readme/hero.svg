<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" role="img" aria-label="Namoo Reader">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f1"/>
      <stop offset="100%" stop-color="#ebe8df"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d9dbd3" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)" opacity="0.45"/>
  <rect x="0" y="0" width="8" height="420" fill="#526b55"/>

  <!-- Left: brand + value -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="64" y="92" fill="#526b55" font-size="18" font-weight="700" letter-spacing="0.16em">NAMOO READER</text>
    <text x="64" y="158" fill="#20221f" font-size="44" font-weight="750">Read. Translate. Draft.</text>
    <text x="64" y="206" fill="#6f716b" font-size="22" font-weight="500">Self-hosted RSS workspace for AI research and writing</text>

    <!-- Feature chips -->
    <g font-size="15" font-weight="600">
      <rect x="64" y="248" width="118" height="36" rx="8" fill="#fff" stroke="#d9dbd3"/>
      <text x="84" y="271" fill="#20221f">RSS / RSSHub</text>
      <rect x="194" y="248" width="108" height="36" rx="8" fill="#fff" stroke="#d9dbd3"/>
      <text x="214" y="271" fill="#20221f">Translation</text>
      <rect x="314" y="248" width="128" height="36" rx="8" fill="#fff" stroke="#d9dbd3"/>
      <text x="334" y="271" fill="#20221f">Creation draft</text>
      <rect x="454" y="248" width="96" height="36" rx="8" fill="#fff" stroke="#d9dbd3"/>
      <text x="474" y="271" fill="#20221f">Onepage</text>
    </g>

    <text x="64" y="340" fill="#6f716b" font-size="16">One Node container · SQLite · optional DeepSeek / OpenAI-compatible AI</text>
  </g>

  <!-- Right: mini reader card -->
  <g transform="translate(720, 56)">
    <rect x="0" y="0" width="420" height="308" rx="12" fill="#fbfaf6" stroke="#d9dbd3" stroke-width="1.5"/>
    <rect x="0" y="0" width="420" height="8" rx="12" fill="#526b55"/>
    <rect x="0" y="4" width="420" height="8" fill="#526b55"/>

    <!-- Sidebar -->
    <rect x="16" y="28" width="112" height="260" rx="8" fill="#f0efe8" stroke="#e2e1d8"/>
    <rect x="28" y="48" width="72" height="8" rx="2" fill="#526b55" opacity="0.85"/>
    <rect x="28" y="72" width="88" height="6" rx="2" fill="#b8b9b1"/>
    <rect x="28" y="90" width="80" height="6" rx="2" fill="#c9cac3"/>
    <rect x="28" y="108" width="84" height="6" rx="2" fill="#c9cac3"/>
    <rect x="28" y="126" width="70" height="6" rx="2" fill="#c9cac3"/>
    <rect x="28" y="158" width="88" height="6" rx="2" fill="#b8b9b1"/>
    <rect x="28" y="176" width="76" height="6" rx="2" fill="#c9cac3"/>
    <rect x="28" y="194" width="82" height="6" rx="2" fill="#c9cac3"/>

    <!-- Article list -->
    <rect x="144" y="28" width="260" height="72" rx="8" fill="#fff" stroke="#e2e1d8"/>
    <rect x="158" y="44" width="160" height="8" rx="2" fill="#20221f"/>
    <rect x="158" y="60" width="200" height="6" rx="2" fill="#9a9b93"/>
    <rect x="158" y="74" width="120" height="6" rx="2" fill="#b8b9b1"/>

    <rect x="144" y="112" width="260" height="72" rx="8" fill="#fff" stroke="#e2e1d8"/>
    <rect x="158" y="128" width="180" height="8" rx="2" fill="#20221f"/>
    <rect x="158" y="144" width="210" height="6" rx="2" fill="#9a9b93"/>
    <rect x="158" y="158" width="140" height="6" rx="2" fill="#b8b9b1"/>

    <rect x="144" y="196" width="260" height="92" rx="8" fill="#fff" stroke="#526b55" stroke-width="1.5"/>
    <rect x="158" y="214" width="48" height="16" rx="4" fill="#526b55"/>
    <text x="166" y="226" fill="#fbfaf6" font-size="10" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700">DRAFT</text>
    <rect x="158" y="242" width="190" height="8" rx="2" fill="#20221f"/>
    <rect x="158" y="258" width="220" height="6" rx="2" fill="#9a9b93"/>
    <rect x="158" y="272" width="160" height="6" rx="2" fill="#b8b9b1"/>
  </g>
</svg>
