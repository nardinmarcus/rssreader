name: Feature request
description: Suggest a focused QMReader improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What reading, RSS, AI, or self-hosting workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches you considered.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Check
      options:
        - label: This request does not include API keys, credentials, or private content.
          required: true
