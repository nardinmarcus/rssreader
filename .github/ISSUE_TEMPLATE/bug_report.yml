name: Bug report
description: Report a reproducible QMReader bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include source id, route, command, or UI path when relevant.
      placeholder: |
        1. Start QMReader with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Environment And Verification
      description: Node version, OS, deployment mode, and commands/logs checked. Remove secrets before pasting.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Check
      options:
        - label: I removed API keys, cookies, passwords, tokens, private URLs, and personal data from this report.
          required: true
