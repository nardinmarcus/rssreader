<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QMReader · RSS 阅读器</title>
  <link rel="alternate" type="application/rss+xml" title="QMReader 公开资产" href="/assets.xml" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/styles.css?v=74" />
</head>
<body data-theme="light">
  <div id="app">
    <!-- ===== Sidebar ===== -->
    <aside id="sidebar">
      <div class="brand">
        <div class="brand-logo">Q</div>
        <div class="brand-name">QMReader</div>
        <button id="sidebar-toggle" class="icon-btn" title="收起左侧栏">⇤</button>
        <button id="theme-toggle" class="icon-btn" title="切换主题">◐</button>
      </div>

      <div class="views">
        <button class="view-btn active" data-view="all"><span class="view-ico">▤</span><span class="view-label">全部</span><span class="count" id="count-all"></span></button>
        <button class="view-btn" data-view="unread"><span class="view-ico">●</span><span class="view-label">未读</span><span class="count" id="count-unread"></span></button>
        <button class="view-btn" data-view="starred"><span class="view-ico">★</span><span class="view-label">收藏</span><span class="count" id="count-starred"></span></button>
        <button class="view-btn" data-view="assets"><span class="view-ico">◆</span><span class="view-label">资产</span><span class="count" id="count-assets"></span></button>
        <button class="view-btn" data-view="contributors"><span class="view-ico">◇</span><span class="view-label">贡献者</span><span class="count" id="count-contributors"></span></button>
      </div>

      <div id="asset-dashboard" class="asset-dashboard hidden">
        <button id="asset-dashboard-open" class="asset-dashboard-open" type="button">
          <span class="asset-dashboard-kicker">公开资产</span>
          <strong id="asset-dashboard-total">0 条</strong>
          <span id="asset-dashboard-recent">暂无沉淀</span>
        </button>
        <div class="asset-dashboard-grid" aria-label="资产类型筛选">
          <button class="asset-stat asset-stat-translation" type="button" data-asset-filter="translation">
            <span>中译</span><strong id="asset-stat-translation">0</strong>
          </button>
          <button class="asset-stat asset-stat-rewrite" type="button" data-asset-filter="rewrite">
            <span>重写</span><strong id="asset-stat-rewrite">0</strong>
          </button>
          <button class="asset-stat asset-stat-comments" type="button" data-asset-filter="comments">
            <span>点评</span><strong id="asset-stat-comments">0</strong>
          </button>
          <button class="asset-stat asset-stat-chat" type="button" data-asset-filter="chat">
            <span>对话</span><strong id="asset-stat-chat">0</strong>
          </button>
        </div>
      </div>

      <div class="sidebar-scroll" id="feed-groups"><!-- groups injected --></div>

      <div class="account-strip">
        <button id="auth-open" class="ghost-btn">登录 / 注册</button>
        <div id="account-info" class="account-info hidden"></div>
        <button id="my-comments-btn" class="ghost-btn account-my-comments hidden" type="button" title="我的资产">资产</button>
        <button id="sidebar-ai-settings" class="ghost-btn account-ai-settings" type="button" title="AI 模型配置">⚿ AI 设置</button>
        <button id="logout-btn" class="icon-btn hidden" title="退出登录">⎋</button>
      </div>

      <div class="sidebar-footer">
        <button id="refresh-btn" class="ghost-btn">↻ 刷新全部</button>
        <button id="manage-btn" class="ghost-btn">⚙ 管理源</button>
      </div>
    </aside>

    <!-- ===== Entry list ===== -->
    <section id="entry-pane">
      <header class="pane-header">
        <div class="pane-title" id="list-title">全部</div>
        <div class="pane-actions">
          <input id="search" type="search" placeholder="搜索文章…" />
          <button id="mark-read-btn" class="icon-btn" title="全部标为已读">✓</button>
        </div>
      </header>
      <div id="asset-activity-strip" class="asset-activity-strip hidden"></div>
      <div id="entry-list" class="entry-list"></div>
    </section>

    <div id="list-resizer" class="pane-resizer" role="separator" aria-orientation="vertical" aria-label="调整文章列表宽度" tabindex="0"></div>

    <!-- ===== Reader ===== -->
    <section id="reader-pane">
      <div id="reader-empty" class="reader-empty">
        <div class="empty-logo">Q</div>
        <p>选择一篇文章开始阅读</p>
      </div>
      <article id="reader" class="reader hidden">
        <header class="reader-head">
          <div class="reader-source" id="reader-source"></div>
          <h1 id="reader-title"></h1>
          <div id="reader-title-zh" class="reader-title-zh hidden"></div>
          <div class="reader-meta" id="reader-meta"></div>
          <div id="reader-assets" class="asset-badges reader-asset-badges hidden"></div>
          <div id="reader-asset-summary" class="reader-asset-summary hidden"></div>
          <div class="reader-toolbar">
            <a id="reader-open" class="ghost-btn" target="_blank" rel="noopener">↗ 打开原文</a>
            <button id="reader-fetch-original" class="ghost-btn" type="button">获取原文</button>
            <button id="reader-copy-link" class="ghost-btn" type="button">⧉ 复制链接</button>
            <button id="reader-star" class="ghost-btn">★ 收藏</button>
          </div>
        </header>
        <div id="reader-audio"></div>
        <div class="reader-tabs" role="tablist" aria-label="文章阅读模式">
          <button class="reader-tab active" type="button" data-tab="original">原文</button>
          <button class="reader-tab" type="button" data-tab="translation">中文翻译</button>
          <button class="reader-tab" type="button" data-tab="rewrite">乔木风格重写</button>
        </div>
        <section id="reader-original-panel" class="reader-tab-panel">
          <div id="reader-content" class="reader-content"></div>
        </section>
        <section id="reader-translation" class="reader-translation reader-tab-panel hidden">
          <div class="reader-section-head">
            <span>中文翻译</span>
            <div class="reader-section-actions">
              <span id="translation-meta"></span>
              <button id="translation-copy" class="ghost-btn hidden" type="button">⧉ 复制译文</button>
              <button id="reader-bilingual" class="ghost-btn primary" type="button">生成中文翻译</button>
            </div>
          </div>
          <div id="translation-list" class="translation-list"></div>
          <div id="translation-empty" class="asset-empty hidden">
            <p>这篇文章还没有中文翻译。</p>
          </div>
        </section>
        <section id="reader-rewrite-panel" class="reader-tab-panel hidden">
          <div class="reader-section-head">
            <span>乔木风格重写</span>
            <div class="reader-section-actions">
              <span id="rewrite-meta"></span>
              <button id="rewrite-copy" class="ghost-btn hidden" type="button">⧉ 复制重写</button>
              <button id="reader-rewrite" class="ghost-btn primary" type="button">生成乔木风格重写</button>
            </div>
          </div>
          <div id="rewrite-content" class="rewrite-content"></div>
          <div id="rewrite-empty" class="asset-empty hidden">
            <p>这篇文章还没有乔木风格重写。</p>
          </div>
        </section>
        <section id="reader-comments" class="reader-comments">
          <div class="reader-section-head">
            <span>人工点评</span>
            <div class="comment-head-tools">
              <span id="comments-count"></span>
              <div class="comment-sort" aria-label="点评排序">
                <button type="button" class="comment-sort-btn" data-comment-sort="helpful">有用</button>
                <button type="button" class="comment-sort-btn" data-comment-sort="latest">最新</button>
              </div>
            </div>
          </div>
          <div id="comments-list" class="comments-list"></div>
          <div id="comment-gate" class="asset-gate hidden">
            <button id="comment-login" class="ghost-btn" type="button">登录后发布点评</button>
          </div>
          <form id="comment-form" class="comment-form">
            <div id="comment-tools" class="comment-tools" aria-label="点评模板">
              <button type="button" class="comment-template" data-comment-template="insight">观点</button>
              <button type="button" class="comment-template" data-comment-template="question">疑问</button>
              <button type="button" class="comment-template" data-comment-template="action">行动</button>
              <button type="button" class="comment-template" data-comment-template="quote">引用</button>
              <button type="button" class="comment-template" data-comment-template="source">资料</button>
            </div>
            <textarea id="comment-input" rows="2" placeholder="写下你的人工点评..."></textarea>
            <button id="comment-send" class="ghost-btn" type="submit">发布</button>
          </form>
        </section>
      </article>
    </section>

    <!-- ===== Article agent ===== -->
    <aside id="agent-pane">
      <header class="agent-head">
        <div>
          <div class="agent-kicker">Article Agent</div>
          <div id="agent-title" class="agent-title">未选择文章</div>
          <div id="agent-profile" class="agent-profile">未配置模型</div>
        </div>
        <div class="agent-head-actions">
          <button id="agent-copy-thread" class="icon-btn" title="复制当前对话">⧉</button>
          <button id="agent-settings" class="icon-btn" title="AI 模型配置">⚿</button>
          <button id="agent-close" class="icon-btn" title="关闭 AI 侧栏">→</button>
        </div>
      </header>
      <div id="agent-messages" class="agent-messages"></div>
      <div class="agent-prompts">
        <button class="agent-prompt" data-prompt="用 5 条 bullet 总结这篇文章最值得关注的观点。">总结要点</button>
        <button class="agent-prompt" data-prompt="这篇文章有哪些值得怀疑或需要验证的地方？">质疑观点</button>
        <button class="agent-prompt" data-prompt="如果我是 AI 产品创作者，读完这篇文章下一步可以做什么？">行动建议</button>
        <button class="agent-prompt" data-prompt="给这篇文章提炼 5 句适合转发引用的金句，保留上下文含义。">金句摘录</button>
        <button class="agent-prompt" data-prompt="把文章里的关键事实、数据、案例列出来，并逐条说明它们分别证明了什么。">证据清单</button>
        <button class="agent-prompt" data-prompt="这篇文章的论证依赖哪些前提？哪些前提一旦不成立，结论就会变弱？">前提拆解</button>
        <button class="agent-prompt" data-prompt="帮我写一段适合发到 X / 即刻的中文分享文案，短一点但有观点。">分享文案</button>
        <button class="agent-prompt" data-prompt="如果向阳乔木要基于这篇文章写一篇中文内容，最有传播潜力的切入角度有哪些？给 3 个。">选题角度</button>
      </div>
      <form id="agent-form" class="agent-form">
        <textarea id="agent-input" rows="2" placeholder="问当前文章…" disabled></textarea>
        <button id="agent-send" class="ghost-btn" type="submit" disabled>发送</button>
      </form>
    </aside>
  </div>

  <button id="agent-open" class="agent-open hidden" title="打开 AI 侧栏">AI</button>

  <!-- ===== Manage sources modal ===== -->
  <div id="manage-modal" class="modal hidden">
    <div class="modal-box">
      <header><h2>管理订阅源</h2><button class="icon-btn" id="manage-close">✕</button></header>
      <div id="manage-status" class="manage-status"></div>
      <div id="manage-list" class="manage-list"></div>
    </div>
  </div>

  <div id="auth-modal" class="modal hidden">
    <div class="modal-box auth-box">
      <header><h2 id="auth-title">登录</h2><button class="icon-btn" id="auth-close">✕</button></header>
      <form id="auth-form" class="auth-form">
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" data-mode="login">登录</button>
          <button type="button" class="auth-tab" data-mode="register">注册</button>
        </div>
        <input id="auth-email" type="email" autocomplete="email" placeholder="邮箱" required />
        <input id="auth-password" type="password" autocomplete="current-password" placeholder="密码（至少 8 位）" required />
        <input id="auth-name" class="hidden" type="text" maxlength="40" autocomplete="nickname" placeholder="显示名" />
        <button id="auth-submit" class="ghost-btn" type="submit">登录</button>
      </form>
    </div>
  </div>

  <div id="my-comments-modal" class="modal hidden">
    <div class="modal-box my-comments-box">
      <header>
        <div>
          <h2>我的资产</h2>
          <p>你发布过的公开点评和文章对话，打开后会定位到对应文章。</p>
        </div>
        <button class="icon-btn" id="my-comments-close">✕</button>
      </header>
      <div class="my-asset-tabs" role="tablist" aria-label="我的资产类型">
        <button class="my-asset-tab active" type="button" data-my-asset-tab="comments">点评 <span id="my-comments-count">0</span></button>
        <button class="my-asset-tab" type="button" data-my-asset-tab="chat">对话 <span id="my-chat-count">0</span></button>
      </div>
      <div id="my-comments-list" class="my-comments-list"></div>
    </div>
  </div>

  <div id="contributor-modal" class="modal hidden">
    <div class="modal-box contributor-box">
      <header>
        <div>
          <h2 id="contributor-title">贡献者资产</h2>
          <p id="contributor-subtitle">公开沉淀的点评和文章对话。</p>
        </div>
        <button class="icon-btn" id="contributor-close">✕</button>
      </header>
      <div class="my-asset-tabs" role="tablist" aria-label="贡献者资产类型">
        <button class="my-asset-tab active" type="button" data-contributor-tab="comments">点评 <span id="contributor-comments-count">0</span></button>
        <button class="my-asset-tab" type="button" data-contributor-tab="chat">对话 <span id="contributor-chat-count">0</span></button>
      </div>
      <div id="contributor-list" class="my-comments-list"></div>
    </div>
  </div>

  <div id="ai-config-modal" class="modal hidden">
    <div class="modal-box ai-config-box">
      <header>
        <div>
          <h2>AI 模型配置</h2>
          <p>API Key 只保存在当前浏览器，用于你的翻译和文章对话调用。</p>
        </div>
        <button class="icon-btn" id="ai-config-close">✕</button>
      </header>
      <div class="ai-config-content">
        <aside class="ai-profile-side">
          <div class="ai-side-head">
            <span>配置</span>
            <button id="ai-add-profile" class="ghost-btn" type="button">新增</button>
          </div>
          <div id="ai-profile-list" class="ai-profile-list"></div>
        </aside>
        <form id="ai-profile-form" class="ai-profile-form">
          <div id="ai-config-alert" class="ai-config-alert hidden"></div>

          <section class="ai-form-section">
            <div class="ai-section-head">
              <span>快捷模板</span>
              <a id="ai-key-link" class="ai-key-link hidden" target="_blank" rel="noopener">获取 API Key</a>
            </div>
            <div id="ai-template-list" class="ai-template-list"></div>
          </section>

          <section class="ai-form-section">
            <div class="ai-form-grid two">
              <label>
                <span>配置名称</span>
                <input id="ai-profile-name" type="text" maxlength="48" placeholder="DeepSeek / OpenRouter" required />
              </label>
              <label>
                <span>服务商</span>
                <input id="ai-provider-name" type="text" maxlength="48" placeholder="DeepSeek" />
              </label>
            </div>
            <div class="ai-form-grid two">
              <label>
                <span>Provider ID</span>
                <input id="ai-provider-id" type="text" maxlength="48" placeholder="deepseek" />
              </label>
              <label>
                <span>分类</span>
                <input id="ai-provider-category" type="text" maxlength="48" placeholder="国内大模型" />
              </label>
            </div>
            <label>
              <span>API Key</span>
              <input id="ai-api-key" type="password" autocomplete="off" placeholder="sk-..." />
            </label>
            <label>
              <span>Base URL</span>
              <input id="ai-base-url" type="url" placeholder="https://api.deepseek.com/v1" required />
            </label>
            <label>
              <span>模型</span>
              <input id="ai-model" type="text" placeholder="deepseek-chat" required />
            </label>
            <div id="ai-quick-models" class="ai-quick-models"></div>
            <div class="ai-form-grid three">
              <label>
                <span>Temperature</span>
                <input id="ai-temperature" type="number" min="0" max="2" step="0.1" placeholder="0.7" />
              </label>
              <label>
                <span>Max Tokens</span>
                <input id="ai-max-tokens" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="2000" />
              </label>
              <label class="ai-default-check">
                <input id="ai-default-profile" type="checkbox" />
                <span>设为默认</span>
              </label>
            </div>
            <input id="ai-provider-type" type="hidden" value="openai_compatible" />
            <input id="ai-api-key-url" type="hidden" />
          </section>

          <div id="ai-config-note" class="settings-note"></div>
          <div class="ai-form-actions">
            <button id="ai-fetch-models" class="ghost-btn" type="button">获取模型</button>
            <button id="ai-test" class="ghost-btn" type="button">测试连接</button>
            <button id="ai-delete-profile" class="ghost-btn danger" type="button">删除</button>
            <button id="ai-save-profile" class="ghost-btn primary" type="submit">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/purify.min.js"></script>
  <script src="/app.js?v=74"></script>
</body>
</html>
